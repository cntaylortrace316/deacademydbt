version: 2

models:

  - name: country_details_antarctica
    description: "dbt model to create the country details mart table for Antarctica"
    columns:
      - name: pk
        description: "Primary key for this table"
        tests:
          - unique
          - not_null
      - name: country_continent_name
        description: "Continent of the country"
        tests:
          - accepted_values:
              arguments:
                values: ['Antarctica']

